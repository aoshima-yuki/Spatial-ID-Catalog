name: Collect Spatial ID OSS

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # 毎日 09:00 JST（= 00:00 UTC）

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    # Node.js 20 非推奨 warning の抑制・先行移行用
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run collect.py
        run: python scripts/collect.py
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Commit and push list data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/data/catalog.json
          git diff --cached --quiet || git commit -m "Update OSS list"
          git push origin main
